<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Result</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="
          default-src 'self';
          style-src   'self' https://eu-test.oppwa.com 'unsafe-inline';
          frame-src   'self' https://eu-test.oppwa.com https://pay.google.com https://applepay.cdn-apple.com;
          script-src  'self' https://eu-test.oppwa.com https://pay.google.com https://applepay.cdn-apple.com 'unsafe-inline';
          connect-src 'self' https://eu-test.oppwa.com https://apple-pay-gateway.apple.com https://pay.google.com;
          img-src     'self' https://eu-test.oppwa.com https://www.gstatic.com https://applepay.cdn-apple.com data:;
          font-src    'self' https://applepay.cdn-apple.com https://fonts.googleapis.com https://fonts.gstatic.com;
        ">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Payment Result</h1>
    <p><strong>Status Code:</strong> <span id="statusCode"></span></p>
    <p><strong>Description:</strong> <span id="statusDescription"></span></p>
    <p><strong>Brand:</strong> <span id="paymentBrand"></span></p>
    <p><strong>Amount:</strong> <span id="amount"></span> <span id="currency"></span></p>
  </div>
<script>
  (async () => {
    const el = (id) => document.getElementById(id);
    const params = new URLSearchParams(location.search);
    const resourcePath = params.get('resourcePath');

    if (!resourcePath) {
      el('statusCode').textContent = '—';
      el('statusDescription').textContent = 'Missing resourcePath';
      return;
    }

    try {
      const resp = await fetch(`/result?resourcePath=${encodeURIComponent(resourcePath)}`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();

      el('statusCode').textContent = (data.result && data.result.code) || '';
      el('statusDescription').textContent = (data.result && data.result.description) || '';
      el('paymentBrand').textContent = data.paymentBrand || '';
      el('amount').textContent = data.amount || '';
      el('currency').textContent = data.currency || '';
    } catch (e) {
      el('statusCode').textContent = '';
      el('statusDescription').textContent = 'Failed to load payment status';
    }
  })();
  </script>
</body>
</html>
