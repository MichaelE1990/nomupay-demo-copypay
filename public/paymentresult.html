<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Result</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Payment Result</h1>
    <pre id="result">Loading...</pre>
  </div>

  <script>
    async function fetchResult() {
      const params = new URLSearchParams(window.location.search);
      const resourcePath = params.get('resourcePath');
      if (!resourcePath) {
        document.getElementById('result').textContent = 'No resourcePath found.';
        return;
      }

      try {
        const res = await fetch(`/status?resourcePath=${encodeURIComponent(resourcePath)}`);
        const data = await res.json();
        document.getElementById('result').textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        document.getElementById('result').textContent = 'Error fetching payment status.';
      }
    }

    fetchResult();
  </script>
</body>
</html>
